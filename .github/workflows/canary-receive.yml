name: "Canary receive (upstream: anuga_core)"

# TASK-2298 — cross-repo canary receiver. Triggered by anuga_core's
# canary-dispatch.yml on every push to its main branch. Installs the JUST-
# MERGED anuga_core SHA (not the pin currently in ci.yml) and runs the same
# ANUGA e2e Merewether benchmark the required gate runs, so a breaking
# anuga_core change reds THIS run — attributing itself to the causing
# anuga_core commit in the run name/summary — instead of silently sitting
# unused until someone bumps the pin and then reds an unrelated-looking
# run_anuga PR with no blame signal.
#
# This does NOT change the pin in ci.yml — that only happens via a reviewed
# pin-bump PR (see docs/fleet-enforcement/pin-ratchet.md in Hydrata/deploy).
# A red run here is exactly the signal that ratchet's "red-canary-forced
# proposal" cadence trigger describes: file a bump-or-fix decision to the
# operator, attributing this run + the causing anuga_core SHA.

on:
  repository_dispatch:
    types: [anuga_core_canary]

jobs:
  canary:
    name: "Canary: anuga_core@${{ github.event.client_payload.sha }} (from ${{ github.event.client_payload.repo }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Attribute causing merge
        run: |
          echo "## Cross-repo canary: anuga_core change" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Causing repo: \`${{ github.event.client_payload.repo }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Causing SHA: \`${{ github.event.client_payload.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Causing ref: \`${{ github.event.client_payload.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upstream run: ${{ github.event.client_payload.run_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If this run goes red, it means the anuga_core commit above is NOT yet" >> "$GITHUB_STEP_SUMMARY"
          echo "safe to pin (see docs/fleet-enforcement/pin-ratchet.md in Hydrata/deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "for the bump-or-fix decision this red canary should trigger)." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system GDAL + ANUGA fork build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev build-essential gfortran libopenmpi-dev

      - name: Install package with full deps + GDAL bindings
        run: |
          pip install --upgrade pip
          pip install numpy "GDAL==$(gdal-config --version)"
          pip install -e ".[full,dev]"

      - name: Install the candidate anuga_core SHA (NOT the pinned SHA — this is the point)
        run: |
          pip install --force-reinstall --no-deps "anuga @ git+https://github.com/Hydrata/anuga_core.git@${{ github.event.client_payload.sha }}"
          python -c "import anuga; from osgeo import gdal, ogr; print('anuga', anuga.__version__, '| gdal/ogr import OK')"

      - name: Merewether ARR benchmark + ANUGA integration tests
        run: pytest tests/ -v -m requires_anuga --timeout=1800
