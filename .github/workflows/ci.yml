name: CI

# TASK-2147 W0.4: run_anuga is unified onto a single canonical `main` branch, so CI
# triggers on main only (the divergent 5.x lineage was merged in — see the 6ab2549
# single-main merge). Feature work rides epic/** branches and gates on the PR to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Linux-only: run_anuga runs exclusively on Linux (localhost dev box +
        # AWS Batch containers), never Windows. The windows-latest cells only ever
        # surfaced Windows-runner/POSIX artifacts (entropy-init crash, os.path.join
        # backslash, sub-ms timer granularity, POSIX-only signal.SIGALRM) — zero
        # signal about the runtime we ship. See greenify pass-3 (2026-07-15).
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        # TASK-1226: coverage baseline for the light job (rasterio now runs the
        # 7 nodata-guard tests here too, since [dev] carries it — see pyproject).
        run: pytest tests/ -v -m "not requires_anuga and not requires_geo and not mpi" --cov=run_anuga --cov-report=term-missing

  test-geo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install package with sim + dev dependencies
        run: |
          pip install --upgrade pip
          # Pin the GDAL python bindings to the runner's system libgdal: run_utils.py
          # needs osgeo.ogr/osr (via import_optional), and an unpinned `GDAL` grabs a
          # newer PyPI release whose build fails against the older system headers.
          pip install "GDAL==$(gdal-config --version)"
          pip install -e ".[dev,sim]"

      - name: Run geo component tests
        run: pytest tests/ -v -m "requires_geo and not requires_anuga"

  # TASK-2147 W0.4 — REQUIRED physics gate. The field-validated Merewether ARR
  # urban-flood benchmark (± 0.3 m at 5 gauges) is the trust anchor for the whole
  # rain-on-grid chain: a green unit suite does NOT prove the water is right. This
  # gate runs the full ANUGA stack and must pass on every push/PR to main. It is
  # deliberately slow-and-trusted (the Merewether e2e is ~9 min) — do not make it
  # non-blocking or move it to a nightly. See TASK-2149 for the mesh geo-reference
  # bug this benchmark caught (silently-wrong flood levels on the production path).
  test-anuga-e2e:
    name: ANUGA e2e — Merewether field benchmark (required)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system GDAL + ANUGA fork build toolchain
        run: |
          sudo apt-get update
          # libgdal-dev/gdal-bin for the GDAL bindings; build-essential/gfortran/
          # libopenmpi-dev to compile the anuga_core C/Fortran extensions from source
          # (mirrors anuga_core's own ci.yml Ubuntu build).
          sudo apt-get install -y gdal-bin libgdal-dev build-essential gfortran libopenmpi-dev

      - name: Install package with full deps + GDAL bindings
        run: |
          pip install --upgrade pip
          # numpy before GDAL so osgeo builds its numpy-backed gdal_array too; pin the
          # GDAL bindings to the system libgdal (see test-geo). [full] pulls PyPI anuga
          # here — replaced by the fork in the next step.
          pip install numpy "GDAL==$(gdal-config --version)"
          pip install -e ".[full,dev]"

      # The required physics gate must validate the SAME engine prod runs: the Hydrata
      # anuga_core FORK (localhost + AWS Batch), NOT PyPI upstream `anuga`. Upstream's
      # spatialInputUtil.getRasterExtent cannot import gdal/ogr in this env (the fork
      # carries the rasterio-fallback glue) — which is why every requires_anuga test
      # failed on `ImportError: Failed to import gdal/ogr`. Force-reinstall the fork over
      # the PyPI wheel that [full] just pulled; --no-deps because [full]/PyPI-anuga
      # already installed the shared runtime deps (numpy, scipy, netCDF4, pymetis, dill).
      #
      # TASK-2298: pinned to a deliberate anuga_core SHA (was unpinned `@main`) — under
      # branch protection an unpinned cross-repo ref means any anuga_core merge instantly
      # reds every run_anuga PR, with the fix landing in another repo and no blame signal
      # (TASK-1477's exact failure mode). Ratchet owner + cadence:
      # docs/fleet-enforcement/pin-ratchet.md in Hydrata/deploy. Pinned SHA = anuga_core's
      # origin/main tip as of 2026-07-16 (`git rev-parse origin/main`).
      - name: Install the Hydrata anuga_core fork (prod engine, not PyPI upstream)
        run: |
          pip install --force-reinstall --no-deps "anuga @ git+https://github.com/Hydrata/anuga_core.git@ad1bfe7155f9b16986e0f672cf54275e9c35c5fb"
          python -c "import anuga; from osgeo import gdal, ogr; print('anuga', anuga.__version__, '| gdal/ogr import OK')"

      - name: Merewether ARR benchmark + ANUGA integration tests
        run: pytest tests/ -v -m requires_anuga --timeout=1800

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check run_anuga/ tests/
